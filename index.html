<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Tropical Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="tropical">
  <header class="site-header">
    <nav class="nav">
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#works">Works</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="about" class="section about">
    <h2>About</h2>
    <p>ここに自己紹介が入ります。</p>
    <ul>
      <li>拠点：東京</li>
      <li>専攻：データサイエンス</li>
      <li>関心：UI/UX, Web, AI</li>
    </ul>
  </section>

  <section id="works" class="section works">
    <h2>Works</h2>
    <div class="work-grid">
      <div class="work-card">
        <img src="sample1.jpg" alt="作品1">
        <h3>作品タイトル1</h3>
        <p>概要を記述。</p>
      </div>
      <div class="work-card">
        <img src="sample2.jpg" alt="作品2">
        <h3>作品タイトル2</h3>
        <p>概要を記述。</p>
      </div>
    </div>
  </section>

  <section id="skills" class="section skills">
    <h2>Skills</h2>
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
      <li>Python</li>
      <li>Figma</li>
    </ul>
  </section>

  <section id="contact" class="section contact">
    <h2>Contact</h2>
    <form>
      <label>お名前<input type="text" name="name"></label>
      <label>メール<input type="email" name="email"></label>
      <label>メッセージ<textarea name="message"></textarea></label>
      <button type="submit">送信</button>
    </form>
  </section>

  <footer class="site-footer">
    <p>© Your Name</p>
  </footer>
</body>
</html>
